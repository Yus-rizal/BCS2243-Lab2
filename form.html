<!DOCTYPE html>
<html lang="en">
<head>
    <title>Personal Details Form</title>
</head>
<body>
    <center>
        <h1>Your Personal Details</h1>  
        <form>
            <table border="0">
                <tr>
                    <td><strong>Your name:</strong></td>
                    <td><input type="text" name="name" size="50"></td>
                </tr>
                <tr>
                    <td><strong>Student number:</strong></td>
                    <td><input type="text" name="student_id" size="30"></td>
                </tr>
                <tr>
                    <td><strong>Program:</strong></td>
                    <td>
                        <select name="program">
                            <option>Bachelor of Computer Science (Software Engineering) with Honours</option>
                            <option>Bachelor of Computer Science (Graphics & Multimedia Technology) with Honours</option>
                            <option>Bachelor of Information Technology (Network Engineering) with Honours</option>
                            <option>Diploma in Computer Science</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><strong>Gender:</strong></td>
                    <td>
                        <input type="radio" name="gender" value="male"> Male 
                        <input type="radio" name="gender" value="female"> Female [cite: 80]
                    </td>
                </tr>
                <tr>
                    <td><strong>Hobby:</strong></td>
                    <td>
                        <input type="checkbox" name="hobby" value="reading"> Reading
                        <input type="checkbox" name="hobby" value="outdoor"> Outdoor Activities 
                        <input type="checkbox" name="hobby" value="tv"> Watching TV
                        <input type="checkbox" name="hobby" value="sleeping"> Sleeping 
                    </td>
                </tr>
                <tr>
                    <td><strong>Comments:</strong></td>
                    <td><textarea name="comments" rows="4" cols="40"></textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset"> [cite: 89]
                    </td>
                </tr>
            </table>
        </form>
    </center>
</body>
</html>
